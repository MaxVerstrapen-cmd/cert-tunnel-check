name: Build and push image

# Manual, pinned-tag updates: pushing a git tag like v1.0 builds and publishes
# ghcr.io/<owner>/cert-tunnel-check:v1.0. Nothing auto-updates in CasaOS —
# you bump the tag in the compose file and hit Update yourself.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # arm64 is built via emulation so the image also runs on a Pi / arm CasaOS.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cert-tunnel-check
          # latest=false because metadata-action would otherwise add `latest` on
          # every tag push. Deployments pin an explicit version, so a floating
          # tag only creates a way to accidentally drift onto a new build.
          flavor: |
            latest=false
          # No type=semver here: tags are vX.Y (v1.0), which isn't valid semver
          # and makes that extractor emit a warning without producing a tag.
          tags: |
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
