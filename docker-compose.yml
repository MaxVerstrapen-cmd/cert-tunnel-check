name: cert-tunnel-check

services:
  cert-tunnel-check:
    # Bump this tag manually to update (no Watchtower — this tool is what alerts
    # when other things break, so it shouldn't update itself unattended).
    image: ghcr.io/YOUR_GITHUB_USERNAME/cert-tunnel-check:v1.0
    container_name: cert-tunnel-check
    restart: unless-stopped
    environment:
      # How often to run the full check, in minutes. 360 = every 6 hours.
      INTERVAL_MINUTES: "360"
      CONFIG_PATH: /config/config.json
      STATE_PATH: /state/state.json
    volumes:
      # config.json lives here — edit it on the host, restart to pick up changes.
      - /DATA/AppData/cert-tunnel-check/config:/config
      # state.json lives here — persists so debounce survives restarts.
      - /DATA/AppData/cert-tunnel-check/state:/state
    x-casaos:
      envs:
        - container: INTERVAL_MINUTES
          description:
            en_us: Minutes between checks (360 = every 6 hours).
      volumes:
        - container: /config
          description:
            en_us: Holds config.json — hostnames, thresholds, Discord webhook, Cloudflare credentials.
        - container: /state
          description:
            en_us: Holds state.json — previous results, so alerts only fire on state changes.

x-casaos:
  architectures:
    - amd64
    - arm64
  main: cert-tunnel-check
  author: Matthew
  developer: Matthew
  category: Utilities
  hostname: ""
  icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/cloudflare-zero-trust.png
  index: /
  port_map: ""
  scheme: http
  title:
    en_us: Cert & Tunnel Check
  tagline:
    en_us: Cert expiry, uptime, and Cloudflare Tunnel health alerts to Discord.
  description:
    en_us: >-
      Monitors TLS certificate expiry, HTTP reachability, and Cloudflare Tunnel
      connector health for self-hosted services. Alerts to a Discord webhook only
      when something changes state, so it stays quiet until it matters. Headless —
      no web UI; check the container logs to see run output.
  tips:
    before_install:
      en_us: >-
        Put your config.json in /DATA/AppData/cert-tunnel-check/config before
        starting, or the container will exit on first run.
